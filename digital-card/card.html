<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viorel Gil | Digital Card</title>
  <link rel="stylesheet" href="./card.css" />
</head>
<body>
  <main class="screen">
    <section class="card" aria-label="Tarjeta digital profesional">
      <div class="card-top">
        <img class="avatar" src="./assets/profile-viorel.jpg" alt="Foto de Viorel Gil" />
        <div class="identity">
          <p class="role">Frontend Developer</p>
          <h1>Viorel Gil</h1>
          <p class="meta">GitHub: github.com/ViorelGilRuiz</p>
          <a class="link" href="https://github.com/ViorelGilRuiz" target="_blank" rel="noreferrer">Abrir perfil GitHub</a>
          <a class="link" href="https://github.com/ViorelGilRuiz/Ido-Manager/blob/main/digital-card/assets/ViorelGil_CV.pdf" target="_blank" rel="noreferrer">Ver CV en GitHub (PDF)</a>
        </div>
      </div>
      <div class="card-bottom">
        <img class="qr" src="./assets/viorel-contact-qr.png" alt="QR de contacto profesional" />
        <div class="hint">
          <p>Escanea para guardar contacto y abrir enlaces</p>
          <p class="small">Incluye GitHub y CV en PDF</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
